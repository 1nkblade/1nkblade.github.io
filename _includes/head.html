<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

{%- if page.title -%}
  <title>{{ page.title }} · {{ site.title }}</title>
{%- else -%}
  <title>{{ site.title }}</title>
{%- endif -%}

{% seo title=false %}

<link rel="icon" type="image/png" href="{{ '/assets/images/github-64.png' | relative_url }}">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{{ '/css/base.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/css/layout.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/css/gallery.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/css/cursor.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/css/extras.css' | relative_url }}">

{%- for sheet in page.stylesheets -%}
<link rel="stylesheet" href="{{ sheet | relative_url }}">
{%- endfor -%}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>

{%- if page.extra_head -%}
{{ page.extra_head }}
{%- endif -%}
