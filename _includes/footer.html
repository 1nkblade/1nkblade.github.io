<footer class="footer-custom mt-5">
    <div class="container">
        <div class="row">
            <div class="col-md-4 mb-3">
                <h5 class="footer-title">Quick Links</h5>
                <ul class="list-unstyled">
                    {%- for item in site.data.nav -%}
                    <li><a href="{{ item.url | relative_url }}" class="footer-link">{{ item.title }}</a></li>
                    {%- endfor -%}
                </ul>
            </div>

            <div class="col-md-4 mb-3">
                <h5 class="footer-title">Connect</h5>
                <div class="social-links">
                    <a href="https://inkblade.cloud" target="_blank" rel="noopener" aria-label="Visit inkblade.cloud — main site with projects" class="social-link">
                        <i class="bi bi-globe2 footer-social-icon footer-social-icon-bi" aria-hidden="true"></i>
                        <span>inkblade.cloud</span>
                    </a>
                    <a href="https://github.com/1nkblade" target="_blank" rel="noopener" aria-label="Visit GitHub profile" class="social-link">
                        <img src="{{ '/assets/images/github-64.png' | relative_url }}" alt="GitHub logo" class="footer-social-icon">
                        <span>GitHub</span>
                    </a>
                    <a href="https://www.linkedin.com/in/alaouiomar01/" target="_blank" rel="noopener" aria-label="Visit LinkedIn profile" class="social-link">
                        <img src="{{ '/assets/images/linkedin-64.png' | relative_url }}" alt="LinkedIn logo" class="footer-social-icon">
                        <span>LinkedIn</span>
                    </a>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <h5 class="footer-title">Contact</h5>
                <p class="footer-text">
                    <i class="bi bi-envelope"></i> iamomar1337@gmail.com<br>
                    <i class="bi bi-geo-alt"></i> Available Worldwide<br>
                    <i class="bi bi-clock"></i> Mon-Fri 9:00-18:00
                </p>
            </div>
        </div>

        <hr class="footer-divider">
        <div class="text-center">
            <p class="footer-copyright">&copy; {{ 'now' | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
        </div>
    </div>
</footer>
