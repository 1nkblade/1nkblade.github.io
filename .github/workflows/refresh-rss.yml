name: Refresh RSS feed

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6h, offset to avoid the top-of-hour stampede
  workflow_dispatch:
  push:
    paths:
      - '_data/rss.yml'
      - 'scripts/fetch-rss.mjs'
      - 'scripts/package.json'
      - '.github/workflows/refresh-rss.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Fetch and aggregate feeds
        run: node scripts/fetch-rss.mjs

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/data/feed.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(feed): refresh RSS aggregate [skip ci]"
            git push
          fi
